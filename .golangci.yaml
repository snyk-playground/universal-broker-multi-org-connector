version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - godot
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - predeclared
    - staticcheck
    - unconvert
    - unused

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    tab:
      path: stdout
      colors: false
