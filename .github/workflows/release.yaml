name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install tools
        run: make tools

      - name: Generate changelog
        run: |
          tools/bin/git-chglog --config .github/changelog/config.yaml --output .release/DRAFT.md $(git describe --tags $(git rev-list --tags --max-count=1))
          cat .release/DRAFT.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --config .github/goreleaser.yaml --clean --release-notes=.release/DRAFT.md
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
